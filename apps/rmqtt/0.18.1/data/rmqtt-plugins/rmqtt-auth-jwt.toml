##--------------------------------------------------------------------
## rmqtt-auth-jwt - Casdoor JWT 认证 (RSA)
## 
## 安装后配置:
## 1. 将 Casdoor 应用的证书内容粘贴到 jwt_cert.pem 文件
## 2. 取消注释并修改下面的 validate_claims.iss 和 validate_claims.aud
## 3. 重启 RMQTT 容器
##
## 多组织支持:
## ================================
## - 设备连接时使用格式化的ClientID: {org}/{device_id}
## - ACL规则中使用 %c 占位符匹配ClientID
## - 不同组织的设备有不同的clientid前缀，自动隔离
## 
## JWT Claims 示例 (Casdoor):
## {
##   "sub": "org/device001",
##   "name": "Device 001",
##   "organization": "org",
##   "application": "client_id",
##   "exp": 1234567890,
##   "iss": "https://your-casdoor-domain",
##   "aud": "client_id"
## }
##
## 参考文档: https://github.com/rmqtt/rmqtt/blob/master/docs/en_US/auth-jwt.md
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## 基础配置
##--------------------------------------------------------------------

## JWT 存放位置
## - password: JWT 放在 MQTT 密码字段 (推荐)
## - username: JWT 放在 MQTT 用户名字段
from = "password"

## 加密方式
## - public-key: RSA 公钥验证
## - hmac: HMAC 验证
encrypt = "public-key"

## HMAC 密钥 (使用 HMAC 时需要)
## 使用公钥验证时可以留空或设置任意值
hmac_base64 = ""

## 证书文件路径 (Casdoor 的 JWT 证书)
## 支持格式: PEM 证书或公钥 (RSA/ECDSA)
public_key = "/app/rmqtt/data/jwt_cert.pem"

##--------------------------------------------------------------------
## 连接控制配置
##--------------------------------------------------------------------

## 发布被拒绝后是否断开连接
disconnect_if_pub_rejected = true

## JWT 过期后断开连接
## 安全建议: 启用此选项防止过期令牌持续连接
disconnect_if_expiry = true

##--------------------------------------------------------------------
## JWT Claims 验证配置
## 
## 支持的占位符:
## - ${username}: 用户名
## - ${clientid}: 客户端ID
## - ${ipaddr}: 客户端IP地址
## - ${protocol}: MQTT协议版本 (3=3.1, 4=3.1.1, 5=5.0)
##--------------------------------------------------------------------

## 验证过期时间 (必须启用)
validate_claims.exp = true

## 验证签发者 (强烈建议启用)
## 取消注释并修改为你的 Casdoor 服务地址
## validate_claims.iss = ["https://your-casdoor-domain"]

## 验证受众 (强烈建议启用)
## 取消注释并修改为你的 Casdoor 应用 client_id
## validate_claims.aud = ["your-client-id"]

## 验证 subject (可选)
## 可用于确保JWT的sub与ClientID匹配
## 格式: validate_claims.sub = "${clientid}"
## 这要求设备连接时的ClientID必须与JWT的sub字段一致
#validate_claims.sub = "${clientid}"
