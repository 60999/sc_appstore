##--------------------------------------------------------------------
## rmqtt-auth-jwt - Casdoor JWT 认证 (RSA)
## 
## 连接参数:
## - username: {mqtt_org}/{mqtt_device} (组织名/设备ID)
## - clientid: {mqtt_org}/{mqtt_device} (与username一致)
## - password: JWT Token
##
## JWT Payload 示例 (Casdoor):
## {
##   "sub": "006af2f4-63a6-4073-82c5-ed54729764e7",
##   "mqtt_org": "sxsc",
##   "mqtt_device": "cardputer_01",
##   "exp": 1773104546,
##   "iss": "https://logins.sxsc.ltd",
##   "aud": ["ac47399a655f571edfbc"]
## }
##
## 连接时:
## - username = {mqtt_org}/{mqtt_device} = sxsc/cardputer_01
## - clientid = {mqtt_org}/{mqtt_device} = sxsc/cardputer_01
## - password = JWT Token
##
## 主题格式:
## - device/{mqtt_org}/{mqtt_device}/status
## - device/{mqtt_org}/{mqtt_device}/command
##
## 参考文档: https://github.com/rmqtt/rmqtt/blob/master/docs/en_US/auth-jwt.md
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## 基础配置
##--------------------------------------------------------------------

## JWT 存放位置
from = "password"

## 加密方式
encrypt = "public-key"

## HMAC 配置 (使用公钥验证时为 false)
hmac_base64 = false

## 证书文件路径
public_key = "/app/rmqtt/data/jwt_cert.pem"

##--------------------------------------------------------------------
## 连接控制配置
##--------------------------------------------------------------------

disconnect_if_pub_rejected = true
disconnect_if_expiry = true

##--------------------------------------------------------------------
## JWT Claims 验证配置
## 
## 验证规则:
## - MQTT username 必须为 {mqtt_org}/{mqtt_device} 格式
## - MQTT clientid 必须为 {mqtt_org}/{mqtt_device} 格式
## - mqtt_org 和 mqtt_device 来自 JWT 自定义字段
##--------------------------------------------------------------------

## 验证过期时间
validate_claims.exp = true

## 验证签发者 (可选)
## validate_claims.iss = ["https://logins.sxsc.ltd"]

## 验证受众 (可选)
## validate_claims.aud = ["ac47399a655f571edfbc"]
