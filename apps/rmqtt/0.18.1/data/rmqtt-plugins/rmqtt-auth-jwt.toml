##--------------------------------------------------------------------
## rmqtt-auth-jwt - Casdoor JWT 认证 (RSA)
## 
## 连接参数:
## - username: {org}/{device_id} (组织名/设备ID)
## - clientid: {org}/{device_id} (与username一致)
## - password: JWT Token
##
## JWT Claims 示例 (Casdoor):
## {
##   "sub": "sxsc/cardputer_01",     <- 需要在 Casdoor 中配置为 {org}/{device_id}
##   "name": "cardputer_01",
##   "owner": "sxsc",
##   "exp": 1234567890,
##   "iss": "https://casdoor.example.com",
##   "aud": "client_id"
## }
##
## 重要: Casdoor 配置
## ================================
## 需要在 Casdoor 中将设备的 JWT sub 字段配置为 {org}/{device_id} 格式
## 这样 MQTT clientid 就能包含组织信息，实现多组织隔离
##
## 参考文档: https://github.com/rmqtt/rmqtt/blob/master/docs/en_US/auth-jwt.md
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## 基础配置
##--------------------------------------------------------------------

## JWT 存放位置
from = "password"

## 加密方式
encrypt = "public-key"

## HMAC 配置 (使用公钥验证时为 false)
hmac_base64 = false

## 证书文件路径
public_key = "/app/rmqtt/data/jwt_cert.pem"

##--------------------------------------------------------------------
## 连接控制配置
##--------------------------------------------------------------------

disconnect_if_pub_rejected = true
disconnect_if_expiry = true

##--------------------------------------------------------------------
## JWT Claims 验证配置
## 
## 验证规则:
## - MQTT username 必须与 JWT 的 name 字段匹配
## - MQTT clientid 必须与 JWT 的 sub 字段匹配
## - 建议: 在 Casdoor 中将 sub 配置为 {org}/{device_id} 格式
## - 这样 clientid 就包含组织信息，ACL 可以实现多组织隔离
##--------------------------------------------------------------------

## 验证过期时间
validate_claims.exp = true

## 验证用户名
## MQTT username 必须与 JWT 的 name 字段匹配
validate_claims.name = "${username}"

## 验证 clientid
## MQTT clientid 必须与 JWT 的 sub 字段匹配
## 如果 sub = {org}/{device_id}，则 clientid 也为此格式
validate_claims.sub = "${clientid}"

## 验证签发者 (可选)
## validate_claims.iss = ["https://your-casdoor-domain"]

## 验证受众 (可选)
## validate_claims.aud = ["your-client-id"]
