##--------------------------------------------------------------------
## rmqtt-retainer - 保留消息存储配置
## 
## 功能说明:
## 用于存储MQTT保留消息(Retained Messages)
## 新订阅者订阅主题时会立即收到该主题的最后一条保留消息
## 
## 存储类型:
## - ram: 内存存储 (默认)
## - sled: 本地嵌入式数据库
## - redis: Redis单节点存储
##
## 使用场景:
## - 设备状态广播
## - 配置信息推送
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## 存储类型选择
## 
## ram: 高性能，适合开发测试
## sled: 本地持久化，适合单节点生产环境
## redis: 持久化，适合集群环境
##--------------------------------------------------------------------
storage.type = "ram"

##--------------------------------------------------------------------
## RAM 内存存储配置 (默认)
##--------------------------------------------------------------------
#storage.ram.cache_capacity = "3G"

##--------------------------------------------------------------------
## Sled 本地数据库配置
##--------------------------------------------------------------------
#storage.type = "sled"
#storage.sled.path = "/var/log/rmqtt/.cache/retain/{node}"
#storage.sled.cache_capacity = "3G"

##--------------------------------------------------------------------
## Redis 配置
##--------------------------------------------------------------------
#storage.type = "redis"
#storage.redis.url = "redis://:password@127.0.0.1:6379/"
#storage.redis.prefix = "mqtt-retain"

##--------------------------------------------------------------------
## 保留消息限制配置
##--------------------------------------------------------------------

## 最大保留消息数量 (0表示无限制)
max_retained_messages = 10000

## 最大保留消息Payload大小
max_payload_size = "1MB"

## 保留消息TTL (0表示不过期)
retained_message_ttl = "0m"
