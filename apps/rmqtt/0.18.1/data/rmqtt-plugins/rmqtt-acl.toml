##--------------------------------------------------------------------
## rmqtt-acl - 访问控制列表
## 
## 认证方式: JWT认证
## 
## 连接参数:
## - username: {org}/{device_id} (组织名/设备ID)
## - clientid: {org}/{device_id} (组织名/设备ID，与username一致)
## - password: <JWT Token>
## 
## 占位符说明:
##   %c = {org}/{device_id} (组织名/设备ID)
##   %u = {org}/{device_id} (组织名/设备ID)
## 
## 主题结构:
## - device/{org}/{device_id}/status   设备状态
## - device/{org}/{device_id}/command  设备命令
## 
## 多组织隔离:
## - 不同组织的设备有不同的clientid前缀
## - org001/device001 和 org002/device001 是不同的clientid
## - 不会产生ClientID冲突
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## 发布拒绝后是否断开连接
##--------------------------------------------------------------------
disconnect_if_pub_rejected = true

##--------------------------------------------------------------------
## ACL 规则 (按顺序匹配，匹配成功即停止)
## 
## 权限类型: allow | deny
## 操作类型: publish | subscribe | pubsub
##--------------------------------------------------------------------
rules = [
    ##----------------------------------------------------------------
    ## 1. 管理员账号 - 完全访问权限
    ##----------------------------------------------------------------
    ["allow", { user = "admin" }, "pubsub", ["#"]],
    ["allow", { user = "mqtt-admin" }, "pubsub", ["#"]],
    ["allow", { user = "system" }, "pubsub", ["#"]],

    ##----------------------------------------------------------------
    ## 2. 服务账号 - 用于后端服务访问所有设备数据
    ##----------------------------------------------------------------
    ["allow", { user = "backend-service" }, "pubsub", ["device/#", "user/#", "system/#"]],
    ["allow", { user = "api-server" }, "pubsub", ["device/#", "user/#", "system/#"]],

    ##----------------------------------------------------------------
    ## 3. 设备发布权限
    ##    %c = {org}/{device_id} (组织名/设备ID)
    ##    主题: device/{org}/{device_id}/status
    ##----------------------------------------------------------------
    ["allow", "all", "publish", ["device/%c/status", "device/%c/event", "device/%c/telemetry", "device/%c/sensor"]],

    ##----------------------------------------------------------------
    ## 4. 设备订阅权限
    ##----------------------------------------------------------------
    ["allow", "all", "subscribe", ["device/%c/command", "device/%c/config", "device/%c/ota"]],

    ##----------------------------------------------------------------
    ## 5. 用户权限 - 用户可以访问自己关联的设备
    ##----------------------------------------------------------------
    ["allow", "all", "publish", ["user/%u/device/+/command"]],
    ["allow", "all", "subscribe", ["user/%u/device/#"]],

    ##----------------------------------------------------------------
    ## 6. 共享订阅权限 - 用于负载均衡
    ##----------------------------------------------------------------
    ["allow", { user = "backend-service" }, "subscribe", ["$share/backend/device/#"]],
    ["allow", { user = "api-server" }, "subscribe", ["$share/backend/device/#"]],

    ##----------------------------------------------------------------
    ## 7. 系统主题 - 仅管理员可访问
    ##----------------------------------------------------------------
    ["deny", "all", "subscribe", ["$SYS/#"]],
    ["allow", { user = "admin" }, "pubsub", ["$SYS/#"]],
    ["allow", { user = "mqtt-admin" }, "pubsub", ["$SYS/#"]],

    ##----------------------------------------------------------------
    ## 8. 默认规则 - 拒绝所有其他操作 (安全防线)
    ##----------------------------------------------------------------
    ["deny", "all"]
]
