##--------------------------------------------------------------------
## rmqtt-acl - 访问控制列表
## 
## 主题结构示例:
## - device/{org}/{device_id}/status   设备状态
## - device/{org}/{device_id}/event    设备事件
## - device/{org}/{device_id}/command  设备命令
## - device/{org}/{device_id}/config   设备配置
## 
## 安全策略:
## 1. 设备只能访问自己的主题空间
## 2. 设备只能发布状态/事件，只能订阅命令/配置
## 3. 管理员/服务账号拥有更高权限
## 4. 默认拒绝所有未明确允许的操作
##
## 占位符说明:
##   %c - 客户端ID
##   %u - 用户名
##
## 参考文档: https://github.com/rmqtt/rmqtt/blob/master/docs/en_US/acl.md
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## 发布拒绝后是否断开连接
##--------------------------------------------------------------------
disconnect_if_pub_rejected = true

##--------------------------------------------------------------------
## ACL 规则 (按顺序匹配，匹配成功即停止)
##--------------------------------------------------------------------
rules = [
    ##----------------------------------------------------------------
    ## 1. 管理员账号 - 完全访问权限
    ##----------------------------------------------------------------
    ["allow", { user = "admin" }, "pubsub", ["#"]],

    ##----------------------------------------------------------------
    ## 2. 服务账号 - 用于后端服务访问所有设备数据
    ##----------------------------------------------------------------
    # ["allow", { user = "backend-service" }, "pubsub", ["device/#", "user/#", "system/#"]],

    ##----------------------------------------------------------------
    ## 3. 设备发布权限 - 只能发布到自己的主题空间
    ##    主题格式: device/{org}/{device_id}/{type}
    ##----------------------------------------------------------------
    ["allow", "all", "pub", ["device/%c/status", "device/%c/event", "device/%c/telemetry", "device/%c/sensor"]],

    ##----------------------------------------------------------------
    ## 4. 设备订阅权限 - 只能订阅命令和配置主题
    ##----------------------------------------------------------------
    ["allow", "all", "sub", ["device/%c/command", "device/%c/config", "device/%c/ota"]],

    ##----------------------------------------------------------------
    ## 5. 用户权限 - 用户可以访问自己关联的设备
    ##----------------------------------------------------------------
    ["allow", "all", "pub", ["user/%u/device/+/command"]],
    ["allow", "all", "sub", ["user/%u/device/#"]],

    ##----------------------------------------------------------------
    ## 6. 系统主题 - 仅管理员可访问
    ##----------------------------------------------------------------
    ["deny", "all", "sub", ["$SYS/#"]],
    ["allow", { user = "admin" }, "pubsub", ["$SYS/#"]],

    ##----------------------------------------------------------------
    ## 7. 默认规则 - 拒绝所有其他操作 (安全防线)
    ##----------------------------------------------------------------
    ["deny", "all"]
]
