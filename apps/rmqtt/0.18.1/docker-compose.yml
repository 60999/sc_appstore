services:
  rmqtt:
    image: rmqtt/rmqtt:0.18.0
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "0.0.0.0:${PANEL_APP_PORT_MQTT}:1883"
      - "0.0.0.0:${PANEL_APP_PORT_MQTTS}:8883"
      - "0.0.0.0:${PANEL_APP_PORT_WS}:8083"
      - "0.0.0.0:${PANEL_APP_PORT_HTTP}:6060"
      - "0.0.0.0:${PANEL_APP_PORT_RPC}:5363"
      - "0.0.0.0:${PANEL_APP_PORT_RAFT}:6003"
      - "0.0.0.0:${PANEL_APP_PORT_INTERNAL}:11883"
    volumes:
      - ./data/rmqtt.toml:/app/rmqtt/rmqtt.toml:ro
      - ./data/rmqtt-plugins/rmqtt-auth-jwt.toml:/app/rmqtt/rmqtt-plugins/rmqtt-auth-jwt.toml:ro
      - ./data/rmqtt-plugins/rmqtt-acl.toml:/app/rmqtt/rmqtt-plugins/rmqtt-acl.toml:ro
      - ./data/rmqtt-plugins/rmqtt-retainer.toml:/app/rmqtt/rmqtt-plugins/rmqtt-retainer.toml:ro
      - ./data/jwt_cert.pem:/app/rmqtt/data/jwt_cert.pem:ro
      - ./data/log:/var/log/rmqtt
      - ./data/cache:/var/log/rmqtt/.cache
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/api/v1/brokers"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
