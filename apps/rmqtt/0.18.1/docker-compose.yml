services:
  rmqtt:
    image: rmqtt/rmqtt:0.18.0
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "0.0.0.0:${PANEL_APP_PORT_MQTT}:1883"
      - "0.0.0.0:${PANEL_APP_PORT_MQTTS}:8883"
      - "0.0.0.0:${PANEL_APP_PORT_WS}:8083"
      - "0.0.0.0:${PANEL_APP_PORT_HTTP}:6060"
      - "0.0.0.0:${PANEL_APP_PORT_RPC}:5363"
      - "0.0.0.0:${PANEL_APP_PORT_RAFT}:6003"
      - "0.0.0.0:${PANEL_APP_PORT_INTERNAL}:11883"
    volumes:
      - ./data/rmqtt.toml:/app/rmqtt/rmqtt.toml
      - ./data/rmqtt-plugins/rmqtt-auth-jwt.toml:/app/rmqtt/rmqtt-plugins/rmqtt-auth-jwt.toml
      - ./data/rmqtt-plugins/rmqtt-acl.toml:/app/rmqtt/rmqtt-plugins/rmqtt-acl.toml
      - ./data/rmqtt-plugins/rmqtt-retainer.toml:/app/rmqtt/rmqtt-plugins/rmqtt-retainer.toml
      - ./data/jwt_cert.pem:/app/rmqtt/data/jwt_cert.pem
      - ./data/log:/var/log/rmqtt
      - ./data/cache:/var/log/rmqtt/.cache
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - JWT_CERT_PEM=${JWT_CERT_PEM}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
    entrypoint:
      - /bin/sh
      - -c
      - |
        DATA_DIR="/app/rmqtt/data"
        JWT_CONFIG="/app/rmqtt/rmqtt-plugins/rmqtt-auth-jwt.toml"
        MAIN_CONFIG="/app/rmqtt/rmqtt.toml"
        JWT_CERT_FILE="$DATA_DIR/jwt_cert.pem"

        if [ -n "$JWT_CERT_PEM" ]; then
          echo "$JWT_CERT_PEM" > "$JWT_CERT_FILE"
          echo "JWT certificate written from environment variable"
          
          sed -i 's/plugins.default_startups = \[/plugins.default_startups = [\n    "rmqtt-auth-jwt",/' "$MAIN_CONFIG"
          echo "JWT auth plugin enabled"
        fi

        if [ -n "$JWT_ISSUER" ]; then
          sed -i "s|## validate_claims.iss = .*|validate_claims.iss = [\"$JWT_ISSUER\"]|g" "$JWT_CONFIG"
        fi

        if [ -n "$JWT_AUDIENCE" ]; then
          sed -i "s|## validate_claims.aud = .*|validate_claims.aud = [\"$JWT_AUDIENCE\"]|g" "$JWT_CONFIG"
        fi

        exec /app/rmqtt/rmqtt-bin/rmqttd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/api/v1/brokers"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
