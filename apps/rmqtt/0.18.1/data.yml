      label:
        en: Internal MQTT Port
        ja: 内部MQTTポート
        ms: Port MQTT Dalaman
        pt-br: Porta MQTT Interna
        ru: Внутренний MQTT-порт
        ko: 내부 MQTT 포트
        zh: 内部 MQTT 端口
        zh-Hant: 內部 MQTT 埠
