    - default: "Asia/Shanghai"
      edit: true
      envKey: TIMEZONE
      labelEn: Timezone
      labelZh: 时区
      required: false
      type: text
    - default: |
        ##--------------------------------------------------------------------
        ## RMQTT 主配置文件
        ##--------------------------------------------------------------------
        node.id = 1
        node.name = "rmqtt@127.0.0.1"
        node.cookie = "rmqtt_secret_cookie"
        
        log.level = "info"
        log.to = "console"
        
        plugins.dir = "rmqtt-plugins/"
        plugins.default_startups = [
            "rmqtt-retainer",
            "rmqtt-http-api",
            "rmqtt-auth-jwt",
            "rmqtt-acl"
        ]
        
        listener.tcp.external.addr = "0.0.0.0:1883"
        listener.tcp.external.workers = 8
        listener.tcp.external.max_connections = 1024000
        listener.tcp.external.max_handshaking_limit = 500
        listener.tcp.external.handshake_timeout = "30s"
        listener.tcp.external.max_packet_size = "1MB"
        listener.tcp.external.allow_anonymous = false
        listener.tcp.external.allow_zero_keepalive = true
        
        listener.ws.external.addr = "0.0.0.0:8083"
        
        http_api.addr = "0.0.0.0:6060"
      edit: true
      envKey: RMQTT_CONFIG
      labelEn: Main Config (rmqtt.toml)
      labelZh: 主配置文件 (rmqtt.toml)
      label:
        en: Main Config (rmqtt.toml)
        ja: メイン設定 (rmqtt.toml)
        ms: Konfigurasi Utama (rmqtt.toml)
        pt-br: Configuração Principal (rmqtt.toml)
        ru: Основная конфигурация (rmqtt.toml)
        ko: 기본 설정 (rmqtt.toml)
        zh: 主配置文件 (rmqtt.toml)
        zh-Hant: 主設定檔 (rmqtt.toml)
      required: true
      type: text
    - default: |
        ##--------------------------------------------------------------------
        ## rmqtt-acl - 访问控制列表
        ##--------------------------------------------------------------------
        [{ access = "allow", users = "all", topics = ["#"] }]
      edit: true
      envKey: RMQTT_ACL_CONFIG
      labelEn: ACL Config (rmqtt-acl.toml)
      labelZh: ACL 配置文件 (rmqtt-acl.toml)
      label:
        en: ACL Config (rmqtt-acl.toml)
        ja: ACL設定 (rmqtt-acl.toml)
        ms: Konfigurasi ACL (rmqtt-acl.toml)
        pt-br: Configuração ACL (rmqtt-acl.toml)
        ru: Конфигурация ACL (rmqtt-acl.toml)
        ko: ACL 설정 (rmqtt-acl.toml)
        zh: ACL 配置文件 (rmqtt-acl.toml)
        zh-Hant: ACL 設定檔 (rmqtt-acl.toml)
      required: true
      type: text
    - default: |
        ##--------------------------------------------------------------------
        ## rmqtt-auth-jwt - Casdoor JWT 认证 (RSA)
        ##--------------------------------------------------------------------
        from = "password"
        encrypt = "public-key"
        public_key = "/app/rmqtt/data/jwt/jwt_cert.pem"
        disconnect_if_expiry = true
        validate_claims.exp = true
      edit: true
      envKey: RMQTT_JWT_CONFIG
      labelEn: JWT Auth Config (rmqtt-auth-jwt.toml)
      labelZh: JWT 认证配置 (rmqtt-auth-jwt.toml)
      label:
        en: JWT Auth Config (rmqtt-auth-jwt.toml)
        ja: JWT認証設定 (rmqtt-auth-jwt.toml)
        ms: Konfigurasi Auth JWT (rmqtt-auth-jwt.toml)
        pt-br: Configuração JWT Auth (rmqtt-auth-jwt.toml)
        ru: Конфигурация JWT Auth (rmqtt-auth-jwt.toml)
        ko: JWT 인증 설정 (rmqtt-auth-jwt.toml)
        zh: JWT 认证配置 (rmqtt-auth-jwt.toml)
        zh-Hant: JWT 認證設定 (rmqtt-auth-jwt.toml)
      required: true
      type: text
    - default: ""
      edit: true
      envKey: JWT_PUBLIC_KEY_PEM
      labelEn: JWT Public Key/Certificate (PEM format)
      labelZh: JWT 公钥/证书（PEM 格式）- 粘贴 Casdoor 应用证书即可
      label:
        en: JWT Public Key/Certificate (PEM format) - Paste Casdoor app certificate
        ja: JWT公開鍵/証明書（PEM形式）- Casdoorアプリ証明書を貼り付け
        ms: Kunci Awam/Sijil JWT (format PEM) - Tampal sijil aplikasi Casdoor
        pt-br: Chave Pública/Certificado JWT (formato PEM) - Cole o certificado do aplicativo Casdoor
        ru: Открытый ключ/сертификат JWT (формат PEM) - Вставьте сертификат приложения Casdoor
        ko: JWT 공개 키/인증서 (PEM 형식) - Casdoor 앱 인증서 붙여넣기
        zh: JWT 公钥/证书（PEM 格式）- 粘贴 Casdoor 应用证书即可
        zh-Hant: JWT 公鑰/憑證（PEM 格式）- 貼上 Casdoor 應用憑證即可
      required: false
      type: text
