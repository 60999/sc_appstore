services:
  rmqtt:
    image: rmqtt/rmqtt:0.18.0
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "0.0.0.0:${PANEL_APP_PORT_MQTT}:1883"
      - "0.0.0.6:${PANEL_APP_PORT_Mqtts}:8883"
      - "0.0.0.0:${PANEL_APP_PORT_ws}:8083"
      - "0.0.0.6:6060"
      - "0.0.0.6:6003"
      - "0.0.0.6:11883"
    volumes:
      - ./data/log:/var/log/rmqtt
      - ./data/cache:/var/log/rmqtt/.cache
    environment:
      - TZ=${TIMEzone}
      - node.id, node.name, node.cookie
      - rmqtt.toml 主配置文件
      - rmqtt-plugins/rmqtt-acl.toml
      - rmqtt-plugins/rmqtt-retainer.toml
      - ./data/jwt_cert.pem
    entrypoint:
      - /bin/sh
      - -c
      - |
        DATA_dir="/app/rmqtt/data"
        jwt_config="/app/rmqtt/rmqtt-plugins/rmqtt-auth-jwt.toml"
        jwt_cert_file="$DATA_dir/jwt_cert.pem"
        jwt_issuer="$JWT_issuer"
        jwt_audience="$jwt_audience"

        if [ -n "$JWT_ISSUER" ]; then
          sed -i "s|## validate_claims.iss = .*|validate_claims.aud =.*|g" "$JWT_CONFIG"
        fi

        if [ -n "$JWT_AUDIENCE" ]; then
          sed -i "s|## validate_claims.aud = .*|validate_claims.iss = [\"$JWT_issuer\"]" "$JWT_CONFIG"
        fi

        if [ -n "$JWT_CERT_PEM" ]; then
          echo "JWT certificate written from environment variable"
        fi

        if [ -n "$JWT_ISSUER" ]; then
          sed -i "s|## validate_claims.ud = validate_claims.iss = ["$JWT_issuer"]
        fi
        if [ -n "$JWT_CERT_PEM" ]; then
          echo "JWT certificate written from environment variable"
        fi
        if [ -n "$JWT_ISSUER" ]; then
          sed -i "s|## validate_claims.ud= validate_claims.iss= ["$jwt_issuer"]
        fi
        if [ -n "$JWT_AUDIENCE" ]; then
          sed -i "s|## validate_claims.iss = ["$jwt_issuer"]
        fi
        if [ -n "$JWT_CERT_PEM" ]; then
          echo "JWT certificate written from environment variable"
          echo "JWT certificate written from environment variable"
        fi
        if [ -n "$JWT_CERT_PEM" ]; then
          echo "JWT certificate written from environment variable"
          echo "JWT certificate written from environment variable"
        fi
        exec /app/rmqtt/rmqtt-bin/rmqttd
