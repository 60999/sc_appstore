services:
  penpot-backend:
    image: docker.1ms.run/ghcr.io/penpot/backend:2.13.3
    container_name: ${CONTAINER_NAME}-backend
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - PENPOT_PUBLIC_URI=${PANEL_APP_URL}
      - PENPOT_DATABASE_URI=postgresql://${PANEL_DB_USER}:${PANEL_DB_USER_PASSWORD}@${PANEL_DB_HOST}:${PANEL_DB_PORT}/${PANEL_DB_NAME}
      - PENPOT_REDIS_URI=redis://:${PANEL_REDIS_ROOT_PASSWORD}@${PANEL_REDIS_HOST}:6379/0
      - PENPOT_FLAGS=enable-login-with-password disable-email-verification enable-preplanning
      - PENPOT_TELEMETRY_ENABLED=false
      - PENPOT_SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./data/assets:/opt/data/assets
    ports:
      - ${PANEL_APP_PORT_BACKEND}:6060
    labels:
      createdBy: "Apps"

  penpot-frontend:
    image: docker.1ms.run/ghcr.io/penpot/frontend:2.13.3
    container_name: ${CONTAINER_NAME}-frontend
    restart: unless-stopped
    networks:
      - 1panel-network
    depends_on:
      - penpot-backend
    environment:
      - PENPOT_PUBLIC_URI=${PANEL_APP_URL}
    ports:
      - ${PANEL_APP_PORT_HTTP}:80
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
