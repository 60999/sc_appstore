additionalProperties:
  formFields:
    - default: 9001
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP 端口
      label:
        en: HTTP Port
        ja: HTTP ポート
        ms: HTTP Port
        pt-br: HTTP Porta
        ru: HTTP Порт
        ko: HTTP 포트
        zh: HTTP 端口
        zh-Hant: HTTP 埠
      required: true
      rule: paramPort
      type: number
    - default: 9002
      edit: true
      envKey: PANEL_APP_PORT_BACKEND
      labelEn: Backend Port
      labelZh: 后端端口
      label:
        en: Backend Port
        ja: バックエンドポート
        ms: Port Backend
        pt-br: Porta Backend
        ru: Порт бэкенда
        ko: 백엔드 포트
        zh: 后端端口
        zh-Hant: 後端埠
      required: true
      rule: paramPort
      type: number
    - default: postgres
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: Database Service
        ja: データベースサービス
        ms: Perkhidmatan Pangkalan Data
        pt-br: Serviço de Banco de Dados
        ru: Сервис базы данных
        ko: 데이터베이스 서비스
        zh: 数据库服务
        zh-Hant: 數據庫服務
      required: true
      type: apps
      child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      values:
        - label: PostgreSQL
          value: postgres
    - default: penpot
      envKey: PANEL_DB_NAME
      labelEn: Database Name
      labelZh: 数据库名
      label:
        en: Database
        ja: データベース
        ms: Pangkalan Data
        pt-br: Banco de Dados
        ru: База данных
        ko: 데이터베이스
        zh: 数据库名
        zh-Hant: 數據庫名
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: penpot
      envKey: PANEL_DB_USER
      labelEn: Database User
      labelZh: 数据库用户
      label:
        en: Database User
        ja: データベースユーザー
        ms: Pengguna Pangkalan Data
        pt-br: Usuário do Banco de Dados
        ru: Пользователь базы данных
        ko: 데이터베이스 사용자
        zh: 数据库用户
        zh-Hant: 數據庫用戶
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: ""
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Database Password
      labelZh: 数据库密码
      label:
        en: Database Password
        ja: データベースパスワード
        ms: Kata Laluan Pangkalan Data
        pt-br: Senha do Banco de Dados
        ru: Пароль базы данных
        ko: 데이터베이스 비밀번호
        zh: 数据库密码
        zh-Hant: 數據庫密碼
      random: true
      required: true
      type: password
    - default: ""
      envKey: PANEL_REDIS_HOST
      key: redis
      labelEn: Redis Service
      labelZh: Redis 服务
      label:
        en: Redis Service
        ja: Redis サービス
        ms: Perkhidmatan Redis
        pt-br: Serviço Redis
        ru: Сервис Redis
        ko: Redis 서비스
        zh: Redis 服务
        zh-Hant: Redis 服務
      required: true
      type: service
    - default: ""
      disabled: true
      envKey: PANEL_REDIS_ROOT_PASSWORD
      labelEn: Redis Password
      labelZh: Redis 密码
      type: text
    - default: ""
      envKey: SECRET_KEY
      labelEn: Secret Key
      labelZh: 密钥
      random: true
      required: true
      type: password
    - default: "https://"
      edit: true
      envKey: PANEL_APP_URL
      labelEn: Application URL (Must be user-accessible address, not localhost/127.0.0.1)
      labelZh: 应用访问地址（必填，用户实际访问的域名，禁止使用 localhost/127.0.0.1）
      required: true
      rule: paramHttp
      type: text
      values:
        - label: 请填写用户访问的完整URL，如 https://penpot.example.com
          value: "https://"
