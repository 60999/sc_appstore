services:
  baserow:
    image: baserow/baserow:2.1.3
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - BASEROW_PUBLIC_URL=${PANEL_APP_URL}
      - DATABASE_HOST=${PANEL_DB_HOST}
      - DATABASE_PORT=${PANEL_DB_PORT}
      - DATABASE_NAME=${PANEL_DB_NAME}
      - DATABASE_USER=${PANEL_DB_USER}
      - DATABASE_PASSWORD=${PANEL_DB_USER_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - BASEROW_JWT_SIGNING_KEY=${JWT_KEY}
      - BASEROW_AMOUNT_OF_GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
    ports:
      - "0.0.0.0:${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/baserow:/baserow/data
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
