services:
  db:
    image: postgres:15-alpine
    container_name: ${CONTAINER_NAME}-db
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - POSTGRES_USER=${PANEL_DB_USER}
      - POSTGRES_PASSWORD=${PANEL_DB_USER_PASSWORD}
      - POSTGRES_DB=${PANEL_DB_NAME}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PANEL_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      createdBy: "Apps"

  baserow:
    image: baserow/baserow:2.1.3
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - BASEROW_PUBLIC_URL=${PANEL_APP_URL}
      - DATABASE_HOST=db
      - DATABASE_NAME=${PANEL_DB_NAME}
      - DATABASE_USER=${PANEL_DB_USER}
      - DATABASE_PASSWORD=${PANEL_DB_USER_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - BASEROW_JWT_SIGNING_KEY=${JWT_KEY}
      - BASEROW_AMOUNT_OF_GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
    ports:
      - ${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/baserow:/baserow/data
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
