services:
  db:
    image: postgres:15-alpine
    container_name: ${CONTAINER_NAME}-db
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - POSTGRES_USER=${DB_USER:-baserow}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-baserow}
      - POSTGRES_DB=${DB_NAME:-baserow}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-baserow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_NAME}-redis
    restart: unless-stopped
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  baserow:
    image: baserow/baserow:1.29.3
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BASEROW_PUBLIC_URL=${PANEL_APP_URL:-http://localhost}
      - DATABASE_HOST=db
      - DATABASE_NAME=${DB_NAME:-baserow}
      - DATABASE_USER=${DB_USER:-baserow}
      - DATABASE_PASSWORD=${DB_PASSWORD:-baserow}
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY}
      - BASEROW_JWT_SIGNING_KEY=${JWT_KEY}
    ports:
      - ${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/baserow:/baserow/data
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
