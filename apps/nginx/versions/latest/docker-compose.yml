version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: ${CONTAINER_NAME:-nginx}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./data/html:/usr/share/nginx/html
      - ./data/conf.d:/etc/nginx/conf.d
      - ./data/ssl:/etc/nginx/ssl
      - ./data/logs:/var/log/nginx
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    networks:
      - nginx-network

networks:
  nginx-network:
    driver: bridge
