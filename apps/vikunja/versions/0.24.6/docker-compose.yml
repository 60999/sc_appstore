services:
  db:
    image: postgres:15-alpine
    container_name: ${CONTAINER_NAME}-db
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - POSTGRES_USER=${DB_USER:-vikunja}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vikunja}
      - POSTGRES_DB=${DB_NAME:-vikunja}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vikunja}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: vikunja/api:0.24.6
    container_name: ${CONTAINER_NAME}-api
    restart: unless-stopped
    networks:
      - 1panel-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - VIKUNJA_DATABASE_HOST=db
      - VIKUNJA_DATABASE_PASSWORD=${DB_PASSWORD:-vikunja}
      - VIKUNJA_DATABASE_USER=${DB_USER:-vikunja}
      - VIKUNJA_DATABASE_DATABASE=${DB_NAME:-vikunja}
      - VIKUNJA_DATABASE_TYPE=postgres
      - VIKUNJA_SERVICE_JWTSECRET=${JWT_SECRET}
      - VIKUNJA_SERVICE_FRONTENDURL=${PANEL_APP_URL:-http://localhost}
    volumes:
      - ./data/files:/app/vikunja/files
    ports:
      - ${PANEL_APP_PORT_API}:3456
    labels:
      createdBy: "Apps"

  frontend:
    image: vikunja/frontend:0.24.6
    container_name: ${CONTAINER_NAME}-frontend
    restart: unless-stopped
    networks:
      - 1panel-network
    depends_on:
      - api
    environment:
      - VIKUNJA_API_URL=http://${CONTAINER_NAME}-api:3456/api/v1
    ports:
      - ${PANEL_APP_PORT_HTTP}:80
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
