services:
  db:
    image: postgres:15-alpine
    container_name: ${CONTAINER_NAME}-db
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - POSTGRES_USER=${DB_USER:-spug}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-spug}
      - POSTGRES_DB=${DB_NAME:-spug}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-spug}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_NAME}-redis
    restart: unless-stopped
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  spug:
    image: openspug/spug:3.3.3
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_HOST=db
      - DATABASE_NAME=${DB_NAME:-spug}
      - DATABASE_USER=${DB_USER:-spug}
      - DATABASE_PASSWORD=${DB_PASSWORD:-spug}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - ${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/spug:/data
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
