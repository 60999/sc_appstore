services:
  spug:
    image: openspug/spug:3.3.3
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      - DATABASE_HOST=${PANEL_DB_HOST}
      - DATABASE_PORT=${PANEL_DB_PORT}
      - DATABASE_NAME=${PANEL_DB_NAME}
      - DATABASE_USER=${PANEL_DB_USER}
      - DATABASE_PASSWORD=${PANEL_DB_USER_PASSWORD}
      - DATABASE_TYPE=${PANEL_DB_TYPE}
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - ${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/spug:/data
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
